<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc" font-family="Helvetica, Arial, sans-serif">
<title id="ttl">Tool fidelity on PharmacometricsBench v0 (mean of 3 runs, error bars = sd)</title>
<desc id="dsc">Grouped bars, mean of three runs with standard-deviation error bars on the model bars. Tool-grounded PharmAgent scores 1.00 everywhere (deterministic, no error bar). Opus 4.8 alone averages 0.93 overall, exact on bioequivalence and exposure but 0.74 (sd 0.11) on compartmental fitting. Haiku 4.5 alone averages 0.60 overall.</desc>
<rect x="0" y="0" width="680" height="400" fill="#ffffff"/>
<text x="50" y="24" font-size="14" font-weight="700" fill="#2C2C2A">Scale gets you close; only tools reach exact</text>

